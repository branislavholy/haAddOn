name: Garni weather station
description: Weather data loader from Garni stations to Home Assistant
version: 1.4.12
slug: garni_weather_station
init: false
url: https://github.com/branislavholy/haAddOn/tree/main/weather
arch:
  - amd64
  - aarch64
startup: services
ports:
  80/tcp: 80
options:
  language: en
  uof: metric
  hostname: ''
  port: 1883
  username: branislav
  password: ''
  log_level: info
schema:
  hostname: str
  language: list(en|sk)
  log_level: list(debug|info)
  password: password
  port: int
  uof: list(metric|imperial)
  username: str
