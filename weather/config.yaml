name: Garni weather station
description: Weather data loader from Garni stations to Home Assistant
version: 1.0.1
slug: garni_weather_station
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
ports:
  8000/tcp: 8000
options:
  language: en
  uof: metric
schema:
  language: list(en|sk)
  uof: list(metric|imperial)
