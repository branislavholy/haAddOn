configuration:
  uof:
    name: "Units of Measurement"
    description: "Controls the units of measurement for the app."
  language:
    name: "Language"
    description: "Controls the language of the units of measurement for the app."
  username:
    name: "MQTT Username"
    description: "The username for the MQTT service API."
  password:
    name: "MQTT Password"
    description: "The password for the MQTT service API."
  port:
    name: "MQTT Port"
    description: " The port for the MQTT service API."
  hostname:
    name: "MQTT Host"
    description: "The hostname for the MQTT service API. If left empty, the default Home Assistant hostname will be used."
