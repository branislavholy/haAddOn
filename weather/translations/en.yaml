configuration:
  unit_system:
    name: "Units System"
    description: "Controls the units system for the app."
  language:
    name: "Language"
    description: "Controls the language of the units of measurement for the app."
  username:
    name: "MQTT Username"
    description: "The username for the MQTT service API."
  password:
    name: "MQTT Password"
    description: "The password for the MQTT service API."
  port:
    name: "MQTT Port"
    description: "The port for the MQTT service API.\nNon SSL default: 1883\nSSL default: 8883"
  hostname:
    name: "MQTT Host"
    description: "The hostname for the MQTT service API. If left empty, the default 'homeassistant' hostname will be used."
  temperature:
    name: "Temperature Unit"
    description: "The unit for temperature measurements."
  precipitation:
    name: "Precipitation Unit"
    description: "The unit for precipitation measurements."
  pressure:
    name: "Pressure Unit"
    description: "The unit for pressure measurements."
  speed:
    name: "Speed Unit"
    description: "The unit for speed measurements."
  log_level:
    name: "Log Level"
    description: "The log level for the add-on."
  skipSslVerify:
    name: "Skip SSL Verification"
    description: "Skip SSL certificate verification when connecting to the MQTT broker."
  ssl:
    name: "Use SSL"
    description: "Use SSL/TLS when connecting to the MQTT broker. If enabled, the default port will be 8883 instead of 1883."
