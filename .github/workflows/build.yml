name: Build

on:
  # pull_request:
  #   branches:
  #     - main
  #   paths:
  #     - '**/go.*'
  #     - '**/main.go'
  push:
    branches:
      - main
    # paths:
    #   - '**/go.*'
    #   - '**/main.go'
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

  workflow_dispatch:

concurrency: go-build${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      flags: ""
    steps:
      - if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: echo "flags=--snapshot" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: weather/data/go.mod
          cache-dependency-path: weather/data/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          # version: latest
          version: "~> v2"
          args: release --clean ${{ env.flags }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
