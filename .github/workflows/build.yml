name: Build

on:
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  workflow_dispatch:

concurrency: go-build${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      flags: ""
    steps:
      - if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: echo "flags=--snapshot" >> $GITHUB_ENV

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # draft: true
          # release-type: go

      - uses: actions/checkout@v6
        # if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0

      - name: Setup Go
        # if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-go@v6
        with:
          go-version-file: weather/data/go.mod
          cache-dependency-path: weather/data/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        # if: ${{ steps.release.outputs.release_created }}
        with:
          distribution: goreleaser
          # version: latest
          version: "~> v2"
          args: release --clean ${{ env.flags }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
