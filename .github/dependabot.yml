version: 2

updates:
  - package-ecosystem: docker
    directory: weather
    schedule:
      interval: monthly
    commit-message:
      prefix: fix(deps)
    groups:
      docker-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: ci(deps)
    groups:
      actions-deps:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directories:
      - "**/*"
    schedule:
      interval: monthly
    commit-message:
      prefix: fix(deps)
    groups:
      golang-deps:
        patterns:
          - "*"
